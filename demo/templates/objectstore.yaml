apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: objectstore-${REGION}
spec:
  configuration:
    destinationPath: s3://backups/
    endpointURL: http://objectstore-${REGION}:9000
    s3Credentials:
      accessKeyId:
        name: objectstore-${REGION}
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: objectstore-${REGION}
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
