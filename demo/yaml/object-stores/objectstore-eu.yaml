apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: objectstore-eu
spec:
  configuration:
    destinationPath: s3://backups/
    endpointURL: http://objectstore-eu:9000
    s3Credentials:
      accessKeyId:
        name: objectstore-eu
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: objectstore-eu
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
